# CI for pull requests: build the Eleventy site from the CNXML source and run
# the post-build verification (page counts, link/fragment integrity, media
# existence, numbering sequences, CNXML leaks, canonical links).
name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel redundant CI runs on the same PR
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Verify (Eleventy)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # assets/js/mathjax/ (MathJax v4 bundle + newcm fonts) and
      # assets/js/vendor/ (MiniSearch) are git-ignored and must be populated
      # from node_modules before every build.
      - name: Copy self-hosted MathJax + MiniSearch bundles
        run: npm run update:vendor

      - name: Build with Eleventy (+ search index)
        run: npm run build

      - name: Verify build
        run: npm run verify

      - name: Write build summary
        if: always()
        run: |
          echo "## CI Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Build + Verify** | ${{ job.status == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
